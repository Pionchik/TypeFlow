<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeFlow — тест скорости печати</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --text-dim: #333;
    --text-muted: #555;
    --text-secondary: #888;
    --text-primary: #ddd;
    --text-bright: #f0f0f0;
    --accent: #ffffff;
    --correct: #b8b8b8;
    --error: #ff4444;
    --error-bg: rgba(255,68,68,0.08);
    --cursor-color: #ffffff;
    --radius: 12px;
    --radius-sm: 6px;
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: 900px;
    padding: 32px 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    border: 2px solid var(--text-bright);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
  }

  .header-info {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* SETTINGS BAR */
  .settings-bar {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .settings-group {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
  }

  .settings-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 8px;
  }

  .btn-option {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .btn-option:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }

  .btn-option.active {
    color: var(--text-bright);
    background: rgba(255,255,255,0.1);
  }

  .separator { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* LIVE STATS */
  .live-stats {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeDown 0.6s 0.15s ease both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color 0.3s ease;
  }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1;
    transition: all 0.2s ease;
  }

  .stat-unit {
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  /* TIMER BAR */
  .timer-bar-container {
    width: 100%;
    max-width: 900px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  .timer-bar {
    height: 100%;
    width: 100%;
    background: var(--text-primary);
    border-radius: 2px;
    transform-origin: left;
    transition: width 1s linear;
  }

  /* TYPING AREA */
  .typing-container {
    width: 100%;
    max-width: 900px;
    position: relative;
    animation: fadeDown 0.6s 0.2s ease both;
    margin-bottom: 28px;
  }

  .words-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 40px;
    position: relative;
    overflow: hidden;
    cursor: text;
    transition: border-color 0.3s ease;
    min-height: 160px;
  }

  .words-wrapper:focus-within { border-color: #333; }

  .words-wrapper::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to bottom, var(--surface), transparent);
    z-index: 5;
    pointer-events: none;
  }

  .words-wrapper::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to top, var(--surface), transparent);
    z-index: 5;
    pointer-events: none;
  }

  #words-display {
    font-size: 1.35rem;
    line-height: 1.95;
    letter-spacing: 0.01em;
    position: relative;
    overflow: hidden;
    height: 116px; /* ~3 lines */
    transition: filter 0.3s ease;
    user-select: none;
  }

  #words-display.blurred { filter: blur(4px); }

  .word { display: inline; }

  .letter {
    display: inline;
    color: var(--text-dim);
    transition: color 0.08s ease;
    position: relative;
  }

  .letter.correct { color: var(--correct); }
  .letter.incorrect { color: var(--error); text-decoration: underline; text-decoration-color: rgba(255,68,68,0.4); }
  .letter.active { color: var(--text-bright); }

  .letter.cursor::before {
    content: '';
    position: absolute;
    left: 0; top: 10%; bottom: 10%;
    width: 2px;
    background: var(--cursor-color);
    border-radius: 1px;
    animation: blink 1s step-start infinite;
  }

  .space-letter { display: inline-block; width: 0.4em; }

  #hidden-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    top: 0; left: 0;
    width: 1px; height: 1px;
  }

  .click-to-start {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .click-to-start.hidden { opacity: 0; }

  /* CONTROLS */
  .controls {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    animation: fadeDown 0.6s 0.25s ease both;
  }

  .btn-restart {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 10px 22px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-restart:hover {
    color: var(--text-bright);
    border-color: #444;
    background: rgba(255,255,255,0.04);
  }

  .btn-restart:active { transform: scale(0.97); }

  .restart-icon {
    display: inline-block;
    transition: transform 0.4s ease;
  }
  .btn-restart:hover .restart-icon { transform: rotate(-180deg); }

  kbd {
    display: inline-block;
    background: var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  /* RESULTS OVERLAY */
  #results-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.96);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #results-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .results-card {
    background: var(--surface);
    border: 1px solid #222;
    border-radius: 20px;
    padding: 52px 60px;
    max-width: 600px;
    width: 100%;
    text-align: center;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #results-overlay.show .results-card { transform: translateY(0) scale(1); }

  .result-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .result-wpm {
    font-family: 'Space Mono', monospace;
    font-size: 6rem;
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1;
    margin-bottom: 4px;
    position: relative;
    display: inline-block;
  }

  .result-wpm-label {
    font-size: 0.9rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }

  .result-item { text-align: center; }
  .result-item-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .result-item-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    color: var(--text-primary);
  }

  .result-divider { width: 40px; height: 1px; background: var(--border); margin: 0 auto 36px; }

  .result-actions { display: flex; gap: 12px; justify-content: center; }

  .btn-primary {
    background: var(--text-bright);
    color: #000;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    padding: 13px 30px;
    border-radius: var(--radius);
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
  }
  .btn-primary:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,255,255,0.1); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    padding: 13px 30px;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
  }
  .btn-secondary:hover { color: var(--text-primary); border-color: #333; }

  /* RANK BADGE */
  .rank-badge {
    display: inline-block;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 16px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* FOOTER */
  footer {
    margin-top: auto;
    padding: 32px 0 24px;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    animation: fadeDown 0.6s 0.3s ease both;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  @keyframes pulse-error {
    0% { border-color: var(--border); }
    50% { border-color: rgba(255,68,68,0.3); }
    100% { border-color: var(--border); }
  }

  .shake { animation: shake 0.3s ease; }
  .pulse-error { animation: pulse-error 0.3s ease; }

  /* COUNT DOWN */
  #countdown {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    font-family: 'Space Mono', monospace;
    font-size: 4rem;
    color: var(--text-bright);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  /* SCROLL INDICATOR */
  .scroll-fade {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(var(--surface), transparent);
    z-index: 4;
    pointer-events: none;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    #words-display { font-size: 1.1rem; }
    .words-wrapper { padding: 28px 22px; }
    .live-stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-value { font-size: 1.4rem; }
    .result-wpm { font-size: 4rem; }
    .result-grid { gap: 12px; }
    .results-card { padding: 36px 24px; }
    header { padding: 24px 0 16px; margin-bottom: 28px; }
    .settings-bar { gap: 4px; }
    .btn-option { padding: 6px 10px; font-size: 0.72rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">TF</div>
    TypeFlow
  </div>
  <div class="header-info">тест скорости печати</div>
</header>

<div class="settings-bar">
  <div class="settings-group">
    <span class="settings-label">режим</span>
    <button class="btn-option active" data-mode="time" onclick="setMode('time', this)">время</button>
    <button class="btn-option" data-mode="words" onclick="setMode('words', this)">слова</button>
  </div>

  <div class="separator"></div>

  <div class="settings-group" id="time-options">
    <button class="btn-option" data-time="15" onclick="setTime(15, this)">15</button>
    <button class="btn-option active" data-time="30" onclick="setTime(30, this)">30</button>
    <button class="btn-option" data-time="60" onclick="setTime(60, this)">60</button>
    <button class="btn-option" data-time="120" onclick="setTime(120, this)">120</button>
  </div>

  <div class="settings-group hidden" id="words-options" style="display:none">
    <button class="btn-option" data-words="10" onclick="setWordCount(10, this)">10</button>
    <button class="btn-option active" data-words="25" onclick="setWordCount(25, this)">25</button>
    <button class="btn-option" data-words="50" onclick="setWordCount(50, this)">50</button>
    <button class="btn-option" data-words="100" onclick="setWordCount(100, this)">100</button>
  </div>

  <div class="separator"></div>

  <div class="settings-group">
    <button class="btn-option active" data-lang="ru" onclick="setLang('ru', this)">RU</button>
    <button class="btn-option" data-lang="en" onclick="setLang('en', this)">EN</button>
  </div>
</div>

<div class="live-stats">
  <div class="stat-card" id="stat-wpm">
    <span class="stat-label">WPM</span>
    <span class="stat-value" id="live-wpm">—</span>
  </div>
  <div class="stat-card" id="stat-acc">
    <span class="stat-label">Точность</span>
    <span class="stat-value" id="live-acc">—</span>
    <span class="stat-unit">%</span>
  </div>
  <div class="stat-card" id="stat-time">
    <span class="stat-label">Время</span>
    <span class="stat-value" id="live-time">30</span>
    <span class="stat-unit">сек</span>
  </div>
</div>

<div class="timer-bar-container">
  <div class="timer-bar" id="timer-bar"></div>
</div>

<div class="typing-container">
  <div class="words-wrapper" id="words-wrapper" onclick="focusInput()">
    <div id="words-display"></div>
    <input id="hidden-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="click-to-start" id="click-hint">нажми для начала</div>
    <div id="countdown"></div>
  </div>
</div>

<div class="controls">
  <button class="btn-restart" onclick="restartTest()">
    <span class="restart-icon">↺</span>
    Заново
  </button>
  <span style="color:var(--text-dim); font-size:0.7rem;"><kbd>Tab</kbd> + <kbd>Enter</kbd></span>
</div>

<footer>TypeFlow · тест скорости · v1.0</footer>

<!-- RESULTS -->
<div id="results-overlay">
  <div class="results-card">
    <div class="result-title">Результат</div>
    <div class="rank-badge" id="result-rank">Начинающий</div>
    <div class="result-wpm" id="result-wpm-val">0</div>
    <div class="result-wpm-label">слов в минуту</div>
    <div class="result-divider"></div>
    <div class="result-grid">
      <div class="result-item">
        <div class="result-item-label">Точность</div>
        <div class="result-item-value" id="result-acc">0%</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">Символов</div>
        <div class="result-item-value" id="result-chars">0</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">Ошибок</div>
        <div class="result-item-value" id="result-errors">0</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-primary" onclick="restartFromResults()">Ещё раз</button>
      <button class="btn-secondary" onclick="closeResults()">Закрыть</button>
    </div>
  </div>
</div>

<script>
// ===================== WORD BANKS =====================
const WORDS_RU = ["время","сказать","можно","такой","теперь","только","очень","после","когда","самый","через","всегда","никогда","сразу","потом","снова","место","работа","жизнь","дорога","вопрос","ответ","слово","мысль","взгляд","голос","рука","лицо","глаза","сердце","чувство","история","люди","ночь","день","утро","вечер","новый","старый","большой","малый","хороший","плохой","первый","последний","каждый","другой","важный","нужный","сильный","тихий","быстрый","медленный","высокий","долгий","чистый","белый","чёрный","красный","синий","далёкий","близкий","прийти","идти","знать","думать","видеть","слышать","помнить","понять","писать","читать","найти","открыть","закрыть","начать","кончить","любить","ждать","жить","сделать","взять","дать","стоять","сидеть","лежать","говорить","смотреть","слушать","бежать","стать","играть","учиться","решить","строить","создать","книга","стол","дверь","окно","дом","город","небо","земля","море","лес","гора","река","звук","свет","тень","ветер","дождь","снег","камень","вода","огонь","воздух","земля"];

const WORDS_EN = ["the","be","to","of","and","in","that","have","it","for","not","on","with","he","as","you","do","at","this","but","his","by","from","they","we","say","her","she","or","an","will","my","one","all","would","there","their","what","so","up","out","if","about","who","get","which","go","me","when","make","can","like","time","no","just","him","know","take","people","into","year","your","good","some","could","them","see","other","than","then","now","look","only","come","its","over","think","also","back","after","use","two","how","our","work","first","well","way","even","new","want","because","any","these","give","day","most","us","great","between","need","large","often","hand","high","place","hold","real","life","few","north","open","seem","together","next","white","children","begin","got","walk","example","ease","paper","group","always","music","those","both","mark","book","letter","until","mile","river","car","feet","care","second","enough","plain","girl","usual","young","ready","above","ever","red","list","though","feel","talk","bird","soon","body","dog","family","direct","pose","leave"];

// ===================== STATE =====================
let mode = 'time'; // 'time' | 'words'
let timeLimit = 30;
let wordCount = 25;
let lang = 'ru';

let words = [];
let currentWordIndex = 0;
let currentLetterIndex = 0;
let typedWords = [];
let typedCurrent = '';

let startTime = null;
let timerInterval = null;
let timeLeft = 30;
let testActive = false;
let testDone = false;

let totalKeystrokes = 0;
let correctKeystrokes = 0;
let errorCount = 0;

let tabPressed = false;

// ===================== INIT =====================
function init() {
  const bank = lang === 'ru' ? WORDS_RU : WORDS_EN;
  const needed = mode === 'words' ? wordCount : 80;
  words = [];
  for (let i = 0; i < needed; i++) {
    words.push(bank[Math.floor(Math.random() * bank.length)]);
  }

  currentWordIndex = 0;
  currentLetterIndex = 0;
  typedWords = words.map(() => []);
  typedCurrent = '';
  startTime = null;
  timeLeft = timeLimit;
  testActive = false;
  testDone = false;
  totalKeystrokes = 0;
  correctKeystrokes = 0;
  errorCount = 0;

  clearInterval(timerInterval);

  document.getElementById('live-wpm').textContent = '—';
  document.getElementById('live-acc').textContent = '—';
  document.getElementById('live-time').textContent = mode === 'time' ? timeLimit : '—';
  document.getElementById('timer-bar').style.width = '100%';

  renderWords();
  updateCursor();
  showClickHint(true);
  document.getElementById('hidden-input').value = '';
}

function renderWords() {
  const display = document.getElementById('words-display');
  display.innerHTML = '';

  words.forEach((word, wi) => {
    const wordEl = document.createElement('span');
    wordEl.className = 'word';
    wordEl.id = `word-${wi}`;

    word.split('').forEach((ch, li) => {
      const span = document.createElement('span');
      span.className = 'letter';
      span.id = `l-${wi}-${li}`;
      span.textContent = ch;
      wordEl.appendChild(span);
    });

    display.appendChild(wordEl);

    if (wi < words.length - 1) {
      const space = document.createElement('span');
      space.className = 'letter space-letter';
      space.id = `l-${wi}-space`;
      space.textContent = ' ';
      display.appendChild(space);
    }
  });
}

function updateCursor() {
  document.querySelectorAll('.letter.cursor').forEach(el => el.classList.remove('cursor'));

  const wordEl = document.getElementById(`word-${currentWordIndex}`);
  if (!wordEl) return;
  const letters = wordEl.querySelectorAll('.letter');

  if (currentLetterIndex < letters.length) {
    letters[currentLetterIndex].classList.add('cursor');
  } else if (letters.length > 0) {
    const last = letters[letters.length - 1];
    last.classList.add('cursor');
  }
  scrollToCurrentWord();
}

function scrollToCurrentWord() {
  const wordEl = document.getElementById(`word-${currentWordIndex}`);
  if (!wordEl) return;
  const display = document.getElementById('words-display');
  const wrapperH = 116;
  const wordTop = wordEl.offsetTop;
  if (wordTop > wrapperH / 2) {
    display.style.transform = `translateY(-${wordTop - 36}px)`;
  } else {
    display.style.transform = 'translateY(0)';
  }
}

function showClickHint(show) {
  const hint = document.getElementById('click-hint');
  const display = document.getElementById('words-display');
  if (show) {
    hint.classList.remove('hidden');
    display.classList.add('blurred');
  } else {
    hint.classList.add('hidden');
    display.classList.remove('blurred');
  }
}

function focusInput() {
  document.getElementById('hidden-input').focus();
  showClickHint(false);
}

// ===================== INPUT =====================
document.getElementById('hidden-input').addEventListener('keydown', function(e) {
  if (testDone) return;

  if (e.key === 'Tab') { tabPressed = true; return; }

  if (e.key === 'Backspace') {
    e.preventDefault();
    handleBackspace();
    return;
  }

  if (e.key === ' ') {
    e.preventDefault();
    handleSpace();
    return;
  }

  if (e.key.length === 1) {
    if (!testActive) startTest();
    handleChar(e.key);
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') { e.preventDefault(); tabPressed = true; }
  if (e.key === 'Enter' && tabPressed) { e.preventDefault(); restartTest(); tabPressed = false; }
});
document.addEventListener('keyup', function(e) {
  if (e.key === 'Tab') tabPressed = false;
});

function startTest() {
  testActive = true;
  startTime = Date.now();
  showClickHint(false);

  if (mode === 'time') {
    timerInterval = setInterval(() => {
      timeLeft--;
      const el = document.getElementById('live-time');
      el.textContent = timeLeft;
      document.getElementById('timer-bar').style.width = (timeLeft / timeLimit * 100) + '%';

      if (timeLeft <= 0) { clearInterval(timerInterval); finishTest(); }
      updateStats();
    }, 1000);
  }
}

function handleChar(ch) {
  const word = words[currentWordIndex];
  if (!word) return;

  totalKeystrokes++;

  if (currentLetterIndex < word.length) {
    const expected = word[currentLetterIndex];
    typedWords[currentWordIndex][currentLetterIndex] = ch;

    const letterEl = document.getElementById(`l-${currentWordIndex}-${currentLetterIndex}`);
    if (ch === expected) {
      if (letterEl) letterEl.className = 'letter correct';
      correctKeystrokes++;
    } else {
      if (letterEl) letterEl.className = 'letter incorrect';
      errorCount++;
      triggerError();
    }
    currentLetterIndex++;
  } else {
    // Extra character beyond word length
    typedWords[currentWordIndex].push(ch);
    const wordEl = document.getElementById(`word-${currentWordIndex}`);
    if (wordEl) {
      const extraSpan = document.createElement('span');
      extraSpan.className = 'letter incorrect';
      extraSpan.id = `l-${currentWordIndex}-extra-${currentLetterIndex}`;
      extraSpan.textContent = ch;
      wordEl.appendChild(extraSpan);
    }
    errorCount++;
    currentLetterIndex++;
    triggerError();
  }

  updateCursor();
  updateStats();

  if (mode === 'words' && currentWordIndex >= words.length) finishTest();
}

function handleSpace() {
  if (currentLetterIndex === 0) return;
  if (currentWordIndex >= words.length - 1) {
    if (mode === 'words') { finishTest(); return; }
  }

  // Mark remaining letters as incorrect
  const word = words[currentWordIndex];
  for (let i = currentLetterIndex; i < word.length; i++) {
    const el = document.getElementById(`l-${currentWordIndex}-${i}`);
    if (el && !el.classList.contains('correct') && !el.classList.contains('incorrect')) {
      el.classList.add('incorrect');
    }
  }

  currentWordIndex++;
  currentLetterIndex = 0;
  typedCurrent = '';
  updateCursor();
  updateStats();
}

function handleBackspace() {
  if (currentLetterIndex > 0) {
    currentLetterIndex--;
    const wordEl = document.getElementById(`word-${currentWordIndex}`);
    const letters = wordEl ? wordEl.querySelectorAll('.letter') : [];

    if (currentLetterIndex < words[currentWordIndex].length) {
      const el = document.getElementById(`l-${currentWordIndex}-${currentLetterIndex}`);
      if (el) el.className = 'letter';
    } else {
      // Remove extra letter element
      const extraEl = document.getElementById(`l-${currentWordIndex}-extra-${currentLetterIndex}`);
      if (extraEl) extraEl.remove();
    }

    typedWords[currentWordIndex][currentLetterIndex] = undefined;
    updateCursor();
  } else if (currentWordIndex > 0) {
    // Go back to previous word
    currentWordIndex--;
    currentLetterIndex = typedWords[currentWordIndex].filter(x => x !== undefined).length;
    updateCursor();
  }
}

function triggerError() {
  const wrapper = document.getElementById('words-wrapper');
  wrapper.classList.remove('shake');
  void wrapper.offsetWidth;
  wrapper.classList.add('shake');
  wrapper.classList.remove('pulse-error');
  void wrapper.offsetWidth;
  wrapper.classList.add('pulse-error');
}

// ===================== STATS =====================
function updateStats() {
  if (!startTime) return;
  const elapsed = (Date.now() - startTime) / 1000 / 60; // minutes
  const correctWords = countCorrectWords();
  const wpm = elapsed > 0 ? Math.round(correctWords / elapsed) : 0;
  const acc = totalKeystrokes > 0 ? Math.round(correctKeystrokes / totalKeystrokes * 100) : 100;

  document.getElementById('live-wpm').textContent = wpm;
  document.getElementById('live-acc').textContent = acc;
}

function countCorrectWords() {
  let count = 0;
  for (let i = 0; i < currentWordIndex; i++) {
    if (isWordCorrect(i)) count++;
  }
  return count;
}

function isWordCorrect(wi) {
  const word = words[wi];
  const typed = typedWords[wi];
  if (!typed) return false;
  if (typed.length !== word.length) return false;
  for (let i = 0; i < word.length; i++) {
    if (typed[i] !== word[i]) return false;
  }
  return true;
}

// ===================== FINISH =====================
function finishTest() {
  if (testDone) return;
  testDone = true;
  testActive = false;
  clearInterval(timerInterval);

  const elapsed = startTime ? (Date.now() - startTime) / 1000 / 60 : 1;
  const correctWords = countCorrectWords();
  const wpm = elapsed > 0 ? Math.round(correctWords / elapsed) : 0;
  const acc = totalKeystrokes > 0 ? Math.round(correctKeystrokes / totalKeystrokes * 100) : 100;
  const chars = totalKeystrokes;
  const errors = errorCount;

  document.getElementById('result-wpm-val').textContent = wpm;
  document.getElementById('result-acc').textContent = acc + '%';
  document.getElementById('result-chars').textContent = chars;
  document.getElementById('result-errors').textContent = errors;

  // Rank
  let rank = 'Новичок';
  if (wpm >= 120) rank = 'Мастер';
  else if (wpm >= 90) rank = 'Профи';
  else if (wpm >= 60) rank = 'Продвинутый';
  else if (wpm >= 40) rank = 'Средний';
  else if (wpm >= 20) rank = 'Начинающий';
  document.getElementById('result-rank').textContent = rank;

  setTimeout(() => {
    document.getElementById('results-overlay').classList.add('show');
  }, 200);
}

function restartTest() {
  document.getElementById('results-overlay').classList.remove('show');
  init();
  setTimeout(focusInput, 100);
}

function restartFromResults() {
  document.getElementById('results-overlay').classList.remove('show');
  setTimeout(() => { init(); focusInput(); }, 200);
}

function closeResults() {
  document.getElementById('results-overlay').classList.remove('show');
  setTimeout(init, 200);
}

// ===================== SETTINGS =====================
function setMode(m, el) {
  mode = m;
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('time-options').style.display = m === 'time' ? 'flex' : 'none';
  document.getElementById('words-options').style.display = m === 'words' ? 'flex' : 'none';

  const statTime = document.getElementById('stat-time');
  statTime.querySelector('.stat-label').textContent = m === 'time' ? 'Время' : 'Прогресс';
  init();
}

function setTime(t, el) {
  timeLimit = t;
  timeLeft = t;
  document.querySelectorAll('[data-time]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  init();
}

function setWordCount(n, el) {
  wordCount = n;
  document.querySelectorAll('[data-words]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  init();
}

function setLang(l, el) {
  lang = l;
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  init();
}

// ===================== START =====================
init();
document.getElementById('hidden-input').addEventListener('focus', () => showClickHint(false));
document.getElementById('hidden-input').addEventListener('blur', () => {
  if (!testActive && !testDone) showClickHint(true);
});
</script>
</body>
